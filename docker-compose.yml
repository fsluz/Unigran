version: "3.9"

services:

  ml:
    build:
      context: ./backend
      dockerfile: project_ml/Dockerfile
    container_name: unigran-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ML_SERVICE_SECRET=${ML_SERVICE_SECRET:-}
      - ML_CSV_DRIVE_ID=${ML_CSV_DRIVE_ID:-}
      - ML_ALLOWED_ORIGINS=${CLIENT_URL:-http://localhost:5173},http://backend:3001
    volumes:
      - ml-models:/app/project_ml/models
      - ml-outputs:/app/project_ml/outputs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unigran-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - ML_SERVICE_URL=http://ml:8000
      - ML_SERVICE_SECRET=${ML_SERVICE_SECRET:-}
      - ML_TIMEOUT_MS=5000
      - ML_MAX_RETRIES=2
    depends_on:
      ml:
        condition: service_healthy
    volumes:
      - backend-outputs:/app/outputs

volumes:
  ml-models:
  ml-outputs:
  backend-outputs:
